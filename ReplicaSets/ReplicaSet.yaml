apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-replicaset1
  labels:
    app: nginx
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx-container3
        image: registry.hub.docker.com/library/nginx